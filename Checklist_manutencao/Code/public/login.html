<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Tesco</title>
  <link rel="stylesheet" href="estilo.css" />
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-wrapper {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      color: #fff;
    }

    .logo {
      display: block;
      margin: 0 auto 30px auto;
      width: 120px;
    }

    .login-wrapper h2 {
      text-align: center;
      margin-bottom: 24px;
      font-size: 26px;
      color: #ffffff;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background-color: rgba(255,255,255,0.15);
      color: #fff;
    }

    .form-group input::placeholder {
      color: #ccc;
    }

    .form-group input:focus {
      outline: none;
      background-color: rgba(255,255,255,0.25);
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background-color: #00c6ff;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .login-btn:hover {
      background-color: #007acc;
    }

    .footer {
      margin-top: 20px;
      text-align: center;
      font-size: 14px;
      color: #ccc;
    }
  </style>
</head>
<link rel="icon" href="./icon.png" type="image/png">
<body>
  <div class="login-wrapper">
    <img src="imagens/Tesco (Medium).png" alt="Logo Tesco" class="logo" />
    <h2>Manutenção Tesco</h2>
   <form id="loginForm">
  <div class="form-group">
    <label for="email">E-mail</label>
    <input type="email" name="email" id="email" required />
  </div>

  <div class="form-group">
    <label for="password">Senha</label>
    <input type="password" name="password" id="password" required />
  </div>

  <div id="mensagem" style="margin-bottom: 15px; color: #ff6b6b; font-weight: bold;"></div>

  <button type="submit" class="login-btn">Entrar</button>
</form>

    <div class="footer">
      © 2025 Sistema de Manutenção
    </div>
  </div>

<script>
  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const mensagemDiv = document.getElementById("mensagem");

    try {
      const resposta = await fetch("/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + localStorage.getItem("token")
        },
        body: JSON.stringify({ email, password }),
      });

      const dados = await resposta.json();

      if (resposta.ok && dados.sucesso) {
        mensagemDiv.style.color = "#00ff99";
        mensagemDiv.textContent = "✅ Login bem-sucedido!";
        localStorage.setItem("token", dados.token);
        // Tenta guardar o nível de admin no localStorage
        try {
          if (dados.nivel_admin !== undefined) {
            localStorage.setItem("nivel_admin", dados.nivel_admin);
          }
        } catch (e) {
          console.warn("⚠️ Não foi possível guardar no localStorage:", e);
        }

        // Redireciona após 1 segundo
        setTimeout(() => {
          window.location.href = "/menu";
        }, 1000);
      } else {
        mensagemDiv.style.color = "#ff6b6b";
        mensagemDiv.textContent = "❌ Email ou senha incorretos.";
      }
    } catch (erro) {
      mensagemDiv.style.color = "#ff6b6b";
      mensagemDiv.textContent = "❌ Erro de conexão com o servidor.";
      console.error("Erro de login:", erro);
    }
  });
</script>



</body>
</html>
