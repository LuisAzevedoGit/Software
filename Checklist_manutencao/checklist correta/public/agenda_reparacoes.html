<h1>Agenda de Reparações</h1>

<div class="filtro-ordens-container">


  <!-- DEPOIS -->
<label>De: <input type="date" class="pesquisa-input" style="width:100px" id="filtroDataInicio"></label>
<label>Até: <input type="date" class="pesquisa-input" style="width:100px"id="filtroDataFim"></label>

  <label>Máquina:</label>
  <input
    type="text"
    id="filtroMaquina"
    placeholder="Ex: DCM BUHLER"
    class="pesquisa-input"
    style="width:160px"
  >
<br>
  <label>Estado:</label>
  <select id="filtroEstado" class="pesquisa-input">
    <option value="">Todos</option>
    <option value="pendente">⏳ Pendente</option>
    <option value="concluido">✅ Concluído</option>
  </select>
<br><br>
  <button
    class="btn-padrao"
    onclick="carregarAgenda()"
  >
    Atualizar
  </button>

</div>

<div id="agenda-container"></div>
