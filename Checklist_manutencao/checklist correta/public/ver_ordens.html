  </label>

  <div class="filtro-controles">

    <select id="filtroConcluido" class="pesquisa-input">
      <option value="todos">Todos</option>
      <option value="true">Concluído</option>
      <option value="false">Em progresso</option>
    </select>

    <input 
      type="text"
      id="filtroMaquina"
      class="pesquisa-input"
      placeholder="Número/Nome da máquina"
    >

    <button onclick="pesquisar()" class="btn-padrao">
