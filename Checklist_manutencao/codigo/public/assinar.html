<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="estilo.css">
    <link rel="icon" href="./icon.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Assinar</title>
    <style>
        /* ── caixa de info do registo ── */
        .sign-info-box {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            background: #f0f4f8;
            border: 1px solid #ced4da;
            border-left: 4px solid #1a3a5c;
            border-radius: 6px;
            padding: 12px 18px;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .sign-info-box span { color: #444; }
        .sign-info-box strong { color: #1a3a5c; }

        /* ── área de assinatura ── */
        #assinatura-container {
            max-width: 560px;
            margin-top: 16px;
        }
        #assinatura-container h3 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #1a3a5c;
            margin-bottom: 10px;
        }

        .canvas-wrap {
            border: 2px dashed #ced4da;
            border-radius: 8px;
            background: #fff;
            position: relative;
            overflow: hidden;
            touch-action: none;
            cursor: crosshair;
        }
        .canvas-wrap:hover { border-color: #1a3a5c; }

        #canvas {
            display: block;
            width: 100%;
            height: 180px;
        }

        .canvas-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 13px;
            color: #bbb;
            pointer-events: none;
            user-select: none;
            letter-spacing: .5px;
        }

        .sign-btns {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .btn-limpar {
            background: #fff;
            border: 1px solid #bbb;
            color: #555;
            padding: 9px 20px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
        }
        .btn-limpar:hover { background: #f0f0f0; }
        .btn-guardar {
            background: #1a3a5c;
            color: #fff;
            border: none;
            padding: 9px 20px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
        }
        .btn-guardar:hover { background: #0e2640; }

        /* ── tabela de resultados (pesquisa por data) ── */
        .sign-result-table {
            border-collapse: collapse;
            font-size: 13px;
            width: 100%;
            margin-top: 8px;
        }
        .sign-result-table th {
            background: #1a3a5c;
            color: #fff;
            padding: 7px 10px;
            text-align: left;
            font-size: 11px;
            letter-spacing: .5px;
        }
        .sign-result-table td {
            border: 1px solid #ced4da;
            padding: 7px 10px;
        }
        .sign-result-table tr:hover td { background: #f5f8fb; }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo-nome">
                <a href="menu.html"><img src="imagens/Tesco (Medium).png" alt="Logo Tesco" class="logo"></a>
                <span class="nome-empresa"></span>
            </div>
            <ul class="nav-links">
              <li><a href="dash.html">Dashboard</a></li>
                <li><a href="checklist.html">Checklist Manutenção</a></li>
                <li><a href="ver_checklist.html">Ver Checklists</a></li>
                <li><a href="ord-trabalho.html">Ordem Trabalho</a></li>
                <li><a href="ver_ordens.html">Ver Ordens</a></li>
                <li><a href="agenda_reparacoes.html">Agenda reparações</a></li>
                <li><a href="vacudest.html">Outras verificações</a></li>
                <li><a href="perfil.html"><i class="fas fa-user"></i></a></li>
            </ul>
        </nav>
    </header>

    <h1>✍️ Assinar Registo</h1>

    <div class="pesquisa-container">
        <label for="id" class="pesquisa-label">ID do Registo:</label>
        <input type="number" id="id" class="pesquisa-input" placeholder="Ex: 12">

        <label for="data" class="pesquisa-label">Ou Data:</label>
        <input type="date" id="data" class="pesquisa-input">

        <button onclick="pesquisar()" class="btn-padrao">
            <i class="fas fa-search"></i> Pesquisar
        </button>
    </div>

    <div id="resultados"></div>

    <div id="assinatura-container" style="display:none">
        <div id="registo-info"></div>

        <h3><i class="fas fa-pen-nib"></i> Assinatura</h3>

        <div class="canvas-wrap">
            <canvas id="canvas"></canvas>
            <span class="canvas-hint" id="canvas-hint">Assina aqui</span>
        </div>

        <div class="sign-btns">
            <button class="btn-limpar" onclick="limparCanvas()">
                <i class="fas fa-undo"></i> Limpar
            </button>
            <button class="btn-guardar" onclick="salvarAssinatura()">
                <i class="fas fa-save"></i> Guardar Assinatura
            </button>
        </div>
    </div>

    <!-- Signature Pad (CDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/signature_pad/4.1.7/signature_pad.umd.min.js"></script>
    <script src="assinatura.js"></script>
</body>
</html>
