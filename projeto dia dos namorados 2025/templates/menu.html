<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Dia dos Namorados</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <style>
        /* Estilos para os corações flutuantes */
        #hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Evita que interfira na interação com o quiz */
            overflow: hidden;
        }

        .heart {
            position: absolute;
            bottom: 0;
            color: red;
            animation: floatUp 5s linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div id="hearts-container"></div>
    <div class="menu">
        <!-- Título Principal -->
        <h1>Feliz Dia dos Namorados ❤️</h1>

        <!-- Foto Romântica -->
        <img src="/static/images/love.jpg" alt="Feliz Dia dos Namorados" class="menu-image">

        <!-- Opções de Navegação -->
        <div class="menu-options">
            <a href="/page/0" class="button">História</a>
            <a href="/gallery" class="button">Galeria de Fotos</a>
            <a href="/quiz" class="button">Quiz</a>
            <a href="/scratch" class="button">Hmmm??</a>
        </div>
    </div>
    <script src="/static/js/gallery.js"></script>
</body>

</html>
