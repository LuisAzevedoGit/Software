<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ver Checklists Guardadas</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f0f2f5;
    padding: 20px;
    font-size: 13px;
  }

  header {
    background: #fff;
    padding: 16px 24px;
    border-radius: 8px;
    margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo { height: 44px; }
  .nav-links { display: flex; list-style: none; gap: 20px; }
  .nav-links a { text-decoration: none; color: #444; font-weight: 500; font-size: 13px; }
  .nav-links a:hover { color: #0055b3; }
  .nav-links a.active { color: #0055b3; border-bottom: 2px solid #0055b3; padding-bottom: 2px; }

  .container { max-width: 1600px; margin: 0 auto; }

  h1 { text-align: center; color: #1a1a2e; font-size: 20px; margin-bottom: 20px; font-weight: 600; }

  /* === FILTROS === */
  .card-filtros {
    background: #fff;
    padding: 20px 24px;
    border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    margin-bottom: 20px;
    display: flex;
    gap: 16px;
    align-items: flex-end;
    flex-wrap: wrap;
  }

  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-weight: 600; color: #333; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }

  .form-group select,
  .form-group input[type="week"] {
    padding: 8px 12px;
    border: 1.5px solid #ddd;
    border-radius: 5px;
    font-size: 13px;
    min-width: 180px;
    transition: border-color 0.2s;
  }

  .form-group select:focus,
  .form-group input[type="week"]:focus {
    outline: none;
    border-color: #0055b3;
  }

  .btn-pesquisar {
    padding: 9px 24px;
    background: #0055b3;
    color: #fff;
    border: none;
    border-radius: 5px;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .btn-pesquisar:hover { background: #003d82; }

  /* === LISTA DE RESULTADOS === */
  #resultados-container { display: none; }

  .resultado-info {
    background: #e8f0fe;
    border-left: 4px solid #0055b3;
    padding: 12px 16px;
    border-radius: 4px;
    margin-bottom: 16px;
    font-weight: 600;
    color: #1a1a2e;
    font-size: 14px;
  }

  .lista-checklists {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }

  .card-checklist {
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    padding: 16px 18px;
    cursor: pointer;
    border-left: 4px solid #0055b3;
    transition: box-shadow 0.2s, transform 0.15s;
    position: relative;
  }
  .card-checklist:hover {
    box-shadow: 0 4px 14px rgba(0,85,179,0.13);
    transform: translateY(-2px);
  }
  .card-checklist.selected {
    border-left-color: #e07b00;
    background: #fff8f0;
  }

  .card-checklist .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }

  .card-checklist .tag-linha {
    background: #0055b3;
    color: #fff;
    font-weight: 700;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 12px;
    letter-spacing: 0.5px;
  }

  .card-checklist .tag-semana {
    font-size: 11px;
    color: #666;
    font-weight: 500;
  }

  .card-checklist .maquina-nome {
    font-size: 15px;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 6px;
  }

  .card-checklist .meta-info {
    font-size: 11px;
    color: #777;
    display: flex;
    gap: 12px;
  }

  .card-checklist .meta-info span { display: flex; align-items: center; gap: 4px; }

  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: #999;
    font-size: 14px;
  }
  .empty-state i { font-size: 40px; margin-bottom: 12px; display: block; opacity: 0.3; }

  /* === VISUALIZAÇÃO DA CHECKLIST === */
  #detalhe-container { display: none; }

  .detalhe-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .detalhe-titulo {
    font-size: 17px;
    font-weight: 700;
    color: #1a1a2e;
  }

  .btn-fechar {
    padding: 8px 18px;
    background: #f0f2f5;
    color: #444;
    border: 1.5px solid #ddd;
    border-radius: 5px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-fechar:hover { background: #e0e4ea; }

  /* === SECÇÃO WRAPPER (igual ao checklist.html) === */
  .secao-wrapper {
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    margin-bottom: 20px;
    overflow: hidden;
  }

  .secao-titulo {
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .secao-operador .secao-titulo  { background: #e07b00; }
  .secao-manutencao .secao-titulo { background: #1565c0; }
  .secao-lider .secao-titulo      { background: #2e7d32; }

  .badge-preenchido {
    background: rgba(255,255,255,0.25);
    color: #fff;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }

  .tabela-checklist {
    width: 100%;
    border-collapse: collapse;
    font-size: 11.5px;
    table-layout: fixed;
  }

  .tabela-checklist th {
    background: #f5f5f5;
    padding: 6px 5px;
    text-align: center;
    font-weight: 600;
    color: #333;
    border: 1px solid #ddd;
    line-height: 1.2;
    vertical-align: middle;
  }

  .tabela-checklist td {
    padding: 5px 6px;
    border: 1px solid #e0e0e0;
    vertical-align: middle;
    color: #222;
    line-height: 1.3;
  }

  .tabela-checklist tbody tr:nth-child(even) { background: #fafafa; }

  .col-local    { width: 60px; text-align: center; }
  .col-item     { width: 200px; }
  .col-caract   { width: 30px; text-align: center; }
  .col-standard { width: 130px; }
  .col-metodo   { width: 90px; }
  .col-periodo  { width: 16px; text-align: center; font-size: 10px; }

  .th-dia {
    background: #e3eaf5 !important;
    font-weight: 700 !important;
    color: #0055b3 !important;
    text-align: center;
  }

  .th-turno {
    background: #f5f7fb !important;
    font-size: 10px !important;
    font-weight: 600 !important;
    color: #555 !important;
  }

  /* Células de valor — só leitura */
  .valor-cell {
    text-align: center;
    font-weight: 600;
    font-size: 12px;
    min-width: 26px;
  }

  .valor-v  { color: #2e7d32; }
  .valor-x  { color: #c62828; }
  .valor-a  { color: #e07b00; }
  .valor-m  { color: #1565c0; }
  .valor-b  { color: #555; }
  .valor-vazio { color: #bbb; font-size: 10px; }

  .td-antes-depois {
    padding: 2px 3px !important;
    vertical-align: top;
  }
  .antes-depois-wrapper { display: flex; flex-direction: column; gap: 2px; }
  .ad-row { display: flex; align-items: center; gap: 4px; }
  .ad-label { font-size: 9px; color: #888; font-weight: 700; text-transform: uppercase; min-width: 14px; }
  .ad-valor { font-size: 11px; font-weight: 600; }

  .legenda-wrapper {
    padding: 10px 16px;
    background: #fafafa;
    border-top: 1px solid #eee;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    font-size: 11px;
    color: #555;
  }
  .legenda-wrapper strong { color: #333; }

  /* Loading */
  .loading {
    text-align: center;
    padding: 40px;
    color: #999;
    font-size: 14px;
  }
  .loading i { animation: spin 1s linear infinite; margin-right: 8px; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  @media (max-width: 900px) {
    .card-filtros { flex-direction: column; }
    .lista-checklists { grid-template-columns: 1fr; }
    .tabela-checklist { font-size: 10px; }
  }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:14px;">
    <a href="menu.html"><img src="imagens/Tesco (Medium).png" alt="Logo" class="logo"></a>
    <span style="font-weight:700;font-size:15px;color:#1a1a2e;">Sistema de Checklists</span>
  </div>
  <ul class="nav-links">
    <li><a href="dashboard.html">Dashboard</a></li>
    <li><a href="checklist.html">Checklist Maquinagem</a></li>
    <li><a href="listar.html">Listar Checklists</a></li>
    <li><a href="ver.html" class="active">Ver Checklists</a></li>
  </ul>
</header>

<div class="container">
  <h1>Ver Checklists Guardadas</h1>

  <!-- FILTROS -->
  <div class="card-filtros">
    <div class="form-group">
      <label for="filtro-linha">Linha de Produção</label>
      <select id="filtro-linha">
        <option value="">Todas as linhas</option>
        <option value="99">Bracket AMG</option>
        <option value="CH1">Cylinder Head 1</option>
        <option value="CH2">Cylinder Head 2</option>
        <option value="CH3">Cylinder Head 3</option>
        <option value="CH4">Cylinder Head 4</option>
        <option value="CH7">Cylinder Head 7</option>
        <option value="FH1">Front Housing 1</option>
        <option value="FH2">Front Housing 2</option>
        <option value="FH3">Front Housing 3</option>
        <option value="FH4">Front Housing 4</option>
        <option value="FH5">Front Housing 5</option>
        <option value="FH6">Front Housing 6</option>
        <option value="FH7">Front Housing 7</option>
        <option value="FH8">Front Housing 8</option>
        <option value="MH">Motor Housing</option>
      </select>
    </div>
    <div class="form-group">
      <label for="filtro-maquina">Máquina</label>
      <select id="filtro-maquina">
        <option value="">Todas as máquinas</option>
      </select>
    </div>
    <div class="form-group">
      <label for="filtro-semana">Semana</label>
      <input type="week" id="filtro-semana">
    </div>
    <button class="btn-pesquisar" id="btn-pesquisar">
      <i class="fas fa-search"></i> Pesquisar
    </button>
  </div>

  <!-- LISTA DE RESULTADOS -->
  <div id="resultados-container">
    <div class="resultado-info" id="resultado-info"></div>
    <div class="lista-checklists" id="lista-checklists"></div>
  </div>

  <!-- DETALHE DA CHECKLIST -->
  <div id="detalhe-container">
    <div class="detalhe-header">
      <div class="detalhe-titulo" id="detalhe-titulo"></div>
      <button class="btn-fechar" id="btn-fechar">
        <i class="fas fa-arrow-left"></i> Voltar à lista
      </button>
    </div>
    <div id="detalhe-conteudo"></div>
  </div>
</div>

<script src="modelo.js"></script>
<script src="ver.js"></script>
</body>
</html>
