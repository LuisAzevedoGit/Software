<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Checklists Semanais</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── Header ── */
  /* ===== HEADER ===== */

header {
  background: #fff;
  padding: 16px 24px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.logo {
  height: 44px;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.header-title {
  font-weight: 700;
  font-size: 15px;
  color: #1a1a2e;
}

.nav-links {
  display: flex;
  list-style: none;
  gap: 20px;
  align-items: center;
}

.nav-links a {
  text-decoration: none;
  color: #444;
  font-weight: 500;
  font-size: 13px;
  transition: color .2s;
}

.nav-links a:hover,
.nav-links a.active {
  color: #0055b3;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.controls {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.controls label {
  font-size: 12px;
  font-weight: 600;
  color: #555;
  text-transform: uppercase;
}

.controls input[type="week"] {
  padding: 8px 12px;
  border: 1.5px solid #ddd;
  border-radius: 5px;
  font-size: 13px;
}

.controls input[type="week"]:focus {
  outline: none;
  border-color: #0055b3;
}

.btn-reload {
  background: #0055b3;
  color: #fff;
  border: none;
  padding: 9px 18px;
  border-radius: 5px;
  font-weight: 600;
  cursor: pointer;
  transition: background .2s;
}

.btn-reload:hover {
  background: #003d82;
}

#week-label {
  color: #666;
  font-size: 12px;
}

@media (max-width: 1100px) {
  header {
    flex-direction: column;
    gap: 15px;
  }

  .nav-links {
    flex-wrap: wrap;
    justify-content: center;
  }

  .header-right {
    justify-content: center;
  }
}

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .controls label { font-size: 13px; color: #aaa; }
    .controls input[type="week"] {
      background: #2a2a42;
      border: 1px solid #3a3a5c;
      color: #fff;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .controls input[type="week"]::-webkit-calendar-picker-indicator { filter: invert(1); }

    .btn-reload {
      background: #4fc3f7;
      color: #1a1a2e;
      border: none;
      padding: 7px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-reload:hover { background: #81d4fa; }

    /* ── Summary bar ── */
    #summary-bar {
      display: flex;
      gap: 16px;
      padding: 14px 28px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      flex-wrap: wrap;
    }
    .stat {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }
    .stat-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .stat-dot.done   { background: #2e7d32; }
    .stat-dot.missing{ background: #c62828; }
    .stat-count { font-weight: 700; font-size: 18px; }
    .stat-label { color: #666; }
    .stat-pct {
      margin-left: 4px;
      font-size: 11px;
      color: #888;
      align-self: flex-end;
      padding-bottom: 2px;
    }
    .divider { width: 1px; background: #e0e0e0; margin: 0 4px; }

    /* ── Main content ── */
    main { padding: 24px 28px; }

    /* ── Line section ── */
    .linha-section {
      margin-bottom: 24px;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .linha-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 18px;
      background: #1a1a2e;
      color: #fff;
      cursor: pointer;
      user-select: none;
    }
    .linha-header:hover { background: #22223a; }
    .linha-name {
      font-weight: 700;
      font-size: 14px;
      letter-spacing: .8px;
      flex: 1;
    }
    .linha-pills {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .pill {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }
    .pill.done    { background: #1b5e20; color: #a5d6a7; }
    .pill.missing { background: #b71c1c; color: #ef9a9a; }
    .collapse-arrow {
      font-size: 12px;
      transition: transform .2s;
      color: #aaa;
    }
    .linha-section.collapsed .collapse-arrow { transform: rotate(-90deg); }

    /* ── Machine grid ── */
    .machine-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      padding: 14px 16px;
    }
    .linha-section.collapsed .machine-grid { display: none; }

    .machine-card {
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: transform .1s, box-shadow .1s;
      border: 1.5px solid transparent;
      position: relative;
    }
    .machine-card:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.12); }

    .machine-card.done {
      background: #f1f8e9;
      border-color: #a5d6a7;
    }
    .machine-card.missing {
      background: #ffebee;
      border-color: #ef9a9a;
    }
    .machine-card.loading {
      background: #f5f5f5;
      border-color: #e0e0e0;
    }

    .machine-num {
      font-size: 20px;
      font-weight: 800;
      color: #1a1a2e;
    }
    .machine-card.done   .machine-num { color: #2e7d32; }
    .machine-card.missing .machine-num { color: #c62828; }

    .machine-status {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .5px;
      text-transform: uppercase;
    }
    .machine-card.done   .machine-status { color: #388e3c; }
    .machine-card.missing .machine-status { color: #d32f2f; }
    .machine-card.loading .machine-status { color: #9e9e9e; }

    .machine-actions {
      display: flex;
      gap: 6px;
    }
    .btn-card {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: .3px;
      display: inline-block;
      transition: opacity .15s;
    }
    .btn-card:hover { opacity: .8; }
    .btn-ver    { background: #1565c0; color: #fff; }
    .btn-criar  { background: #e53935; color: #fff; }

    /* ── Status icon ── */
    .status-icon {
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 16px;
    }

    /* ── Loading / error states ── */
    #loading-overlay {
      text-align: center;
      padding: 48px;
      color: #666;
      font-size: 14px;
    }
    .spinner {
      display: inline-block;
      width: 28px; height: 28px;
      border: 3px solid #ddd;
      border-top-color: #4fc3f7;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Progress bar ── */
    .progress-wrap {
      height: 3px;
      background: #e0e0e0;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 4px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #4fc3f7, #1565c0);
      border-radius: 2px;
      transition: width .5s ease;
    }

    /* ── Week label ── */
    #week-label {
      font-size: 12px;
      color: #bbb;
      white-space: nowrap;
    }

    @media (max-width: 600px) {
      main { padding: 16px; }
      .machine-grid { grid-template-columns: repeat(auto-fill, minmax(110px,1fr)); }

  
    }
  </style>
</head>
<body>

<header>

  <div class="header-left">
    <a href="menu.html">
      <img src="imagens/Tesco (Medium).png" alt="Logo" class="logo">
    </a>

    <span class="header-title">
      Sistema de Checklists
    </span>
  </div>

  <ul class="nav-links">
    <li>
      <a href="dashboard.html">
        <i class="fas fa-chart-line"></i>
        Dashboard
      </a>
    </li>

    <li>
      <a href="checklist.html">
        <i class="fas fa-clipboard-check"></i>
        Checklist Maquinagem
      </a>
    </li>

    <li>
      <a href="listar.html" class="active">
        <i class="fas fa-table"></i>
        Listar Checklists
      </a>
    </li>

    <li>
      <a href="ver.html">
        <i class="fas fa-eye"></i>
        Ver Checklists
      </a>
    </li>
  </ul>

  <div class="header-right">
    <div class="controls">
      <label>Semana</label>

      <input type="week" id="semana-input">

      <span id="week-label"></span>

      <button class="btn-reload" onclick="carregarDashboard()">
        <i class="fas fa-rotate-right"></i>
        Atualizar
      </button>
    </div>
  </div>

</header>

<div id="summary-bar" style="display:none">
  <div class="stat">
    <span class="stat-dot done"></span>
    <span class="stat-count" id="cnt-done">0</span>
    <span class="stat-label">Realizados</span>
    <span class="stat-pct" id="pct-done"></span>
  </div>
  <div class="divider"></div>
  <div class="stat">
    <span class="stat-dot missing"></span>
    <span class="stat-count" id="cnt-missing">0</span>
    <span class="stat-label">Em falta</span>
  </div>
  <div class="divider"></div>
  <div class="stat" style="flex:1">
    <div style="flex:1">
      <div style="font-size:11px;color:#888;margin-bottom:4px">Progresso geral</div>
      <div class="progress-wrap"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
  </div>
</div>

<main id="main-content">
  <div id="loading-overlay">
    <span class="spinner"></span> A carregar modelo...
  </div>
</main>

<!-- modelo.js deve estar carregado antes deste script -->
<script src="modelo.js"></script>
<script src="listar.js"></script>
</body>
</html>
